version: "2"
sql:
  - engine: "mysql"
    schema:
      - "migrations/000001_system_bootstrap.up.sql"
      - "migrations/000002_auth_schema.up.sql"
    queries:
      - "internal/repository/mysql/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/mysql/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: false
