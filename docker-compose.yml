name: eventhub-go

services:
  # MySQL 作为本地/Compose 环境的主业务数据库。
  mysql:
    image: mysql:8.4
    container_name: eventhub-go-mysql
    environment:
      # 本地开发默认账号密码；生产环境不要复用这些弱口令。
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventhub
      MYSQL_USER: eventhub
      MYSQL_PASSWORD: eventhub
      TZ: Asia/Shanghai
    command:
      # 与 Java 版及 Go 端连接参数保持 utf8mb4，避免中文和 emoji 写入异常。
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      # 暴露给宿主机，便于本地工具连接数据库。
      - "3306:3306"
    volumes:
      # 持久化 MySQL 数据，避免容器重建后数据丢失。
      - mysql_data:/var/lib/mysql
    healthcheck:
      # 后续 migrate/app 依赖该健康检查结果启动。
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Redis 用于缓存、会话或后续幂等控制等基础能力。
  redis:
    image: redis:7.2
    container_name: eventhub-go-redis
    # 开启 AOF，提升本地环境重启后的数据可恢复性。
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # 暴露给宿主机，便于本地调试 Redis 数据。
      - "6379:6379"
    volumes:
      # Redis AOF 和数据文件持久化目录。
      - redis_data:/data
    healthcheck:
      # app 启动前要求 Redis 能正常响应 ping。
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # 一次性迁移容器：等待 MySQL 健康后执行 migrations 目录下的 up 脚本。
  migrate:
    image: migrate/migrate:v4.19.0
    container_name: eventhub-go-migrate
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # 只读挂载 migration 文件，避免迁移容器修改源码目录。
      - ./migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      # 使用容器网络内的 mysql 主机名连接数据库，并允许多语句 migration。
      - mysql://eventhub:eventhub@tcp(mysql:3306)/eventhub?multiStatements=true
      - up
    # migration 是一次性任务，执行完成后不自动重启。
    restart: "no"

  # EventHub Go 应用服务，依赖数据库、Redis 和 migration 全部就绪后启动。
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: eventhub-go:local
    container_name: eventhub-go-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # 应用基础信息和运行环境。
      EVENTHUB_APP_NAME: eventhub-backend
      EVENTHUB_ENV: prod
      EVENTHUB_HTTP_PORT: 8080
      EVENTHUB_VERSION: compose
      EVENTHUB_LOG_LEVEL: INFO
      OPENAPI_ENABLED: "false"
      OPENAPI_ASSET_ROOT: /app/api/openapi
      OPENAPI_REQUEST_VALIDATION_ENABLED: "true"
      OPENAPI_SPEC_PATH: /app/api/openapi/eventhub.yaml
      # MySQL 连接池配置；DSN 使用容器网络内的 mysql 主机名。
      EVENTHUB_MYSQL_DSN: eventhub:eventhub@tcp(mysql:3306)/eventhub?charset=utf8mb4&parseTime=true&loc=Local
      EVENTHUB_MYSQL_MAX_OPEN_CONNS: 10
      EVENTHUB_MYSQL_MAX_IDLE_CONNS: 2
      EVENTHUB_MYSQL_CONN_MAX_LIFETIME: 30m
      EVENTHUB_MYSQL_CONN_MAX_IDLE_TIME: 5m
      # Redis 连接与超时配置。
      EVENTHUB_REDIS_ADDR: redis:6379
      EVENTHUB_REDIS_USERNAME: ""
      EVENTHUB_REDIS_PASSWORD: ""
      EVENTHUB_REDIS_DB: 0
      EVENTHUB_REDIS_DIAL_TIMEOUT: 5s
      EVENTHUB_REDIS_READ_TIMEOUT: 3s
      EVENTHUB_REDIS_WRITE_TIMEOUT: 3s
      # 本地 Compose 环境的 JWT 配置；生产环境必须替换签名密钥。
      EVENTHUB_AUTH_TOKEN_ISSUER: eventhub-backend
      EVENTHUB_ACCESS_TOKEN_SIGNING_SECRET: eventhub-compose-access-token-secret-change-me
      EVENTHUB_ACCESS_TOKEN_TTL: 30m
      EVENTHUB_REFRESH_TOKEN_TTL: 720h
      TZ: Asia/Shanghai
    ports:
      # 对宿主机开放 HTTP 服务。
      - "8080:8080"
    healthcheck:
      # 使用应用健康检查端点确认服务可对外响应。
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  # 命名卷由 Docker 管理，用于保留本地依赖服务数据。
  mysql_data:
  redis_data:
