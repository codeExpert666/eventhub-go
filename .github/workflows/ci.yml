name: CI

on:
  pull_request:
  push:
    branches:
      - main

# CI 只需要检出仓库代码，因此将 GITHUB_TOKEN 保持为只读权限。
# 写在顶层默认作用于所有 job，每个 job 允许单独写一份 permissions 进行覆盖
permissions:
  contents: read

# workflow 是当前流程名，Git ref 是触发 CI 的分支或 PR 引用。
# 同一分组只保留最新一次 CI 运行，旧的 CI 运行若仍存在则会被取消。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 多个 job 之间在没有 needs 依赖时，若 runner 资源足够，则会并行执行。
jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      # 每个 job 独立运行；Checkout 默认检出触发本次 workflow 的 commit/ref 对应代码。
      - name: Checkout
        uses: actions/checkout@v6

      # 从 go.mod 读取 Go 版本并配置到 PATH，供后续 go/make 命令使用。
      # 启用 Go modules 缓存与构建缓存，加速重复 CI 运行。
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run quality checks
        run: make quality-check

  generated-contract:
    name: Generated Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # OpenAPI lint 通过 npx 执行固定版本 Redocly CLI；CI 显式提供 Node 运行时。
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download Go modules
        run: go mod download

      - name: Lint OpenAPI
        run: make openapi-lint

      - name: Check generated contracts
        run: make generated-check

  openapi-breaking:
    name: OpenAPI Breaking Change
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # PR 兼容性检查需要同时看到“旧契约”和“新契约”：checkout 已经拿到当前 PR 工作区，
      # 这里再把 PR 的 base branch 拉到本地 remote-tracking ref，供 Makefile 用
      # `origin/<base>:api/openapi/eventhub.yaml` 读取 base 侧的历史 OpenAPI spec。
      # github.base_ref 只在 pull_request 事件中有值，因此 openapi-breaking job 限定为 PR-only。
      # --no-tags 避免下载无关 tag；--depth=1 只取 base branch 最新提交，足够做本次 spec 对比。
      # refspec 左侧是远端 base 分支名，右侧显式写入 refs/remotes/origin/<base>，
      # 这样后续 `OPENAPI_BASE_REF=origin/<base>` 与本地 Makefile 默认命名保持一致。
      - name: Fetch PR base branch
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Check OpenAPI breaking changes
        run: make openapi-breaking-check OPENAPI_BASE_REF=origin/${{ github.base_ref }}

  docker:
    name: Docker
    runs-on: ubuntu-latest

    # GitHub 托管的 Ubuntu runner 已预装 Docker/Compose，可直接运行 docker 命令。
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 解析并校验 Compose 配置；--quiet 只用退出码表达结果，不打印解析后的完整配置。
      - name: Check Docker Compose config
        run: docker compose config --quiet

      - name: Build Docker image
        run: make docker-build
