name: CI

on:
  pull_request:
  push:
    branches:
      - main

# CI 只需要检出仓库代码，因此将 GITHUB_TOKEN 保持为只读权限。
# 写在顶层默认作用于所有 job，每个 job 允许单独写一份 permissions 进行覆盖
permissions:
  contents: read

# workflow 是当前流程名，Git ref 是触发 CI 的分支或 PR 引用。
# 同一分组只保留最新一次 CI 运行，旧的 CI 运行若仍存在则会被取消。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 多个 job 之间在没有 needs 依赖时，若 runner 资源足够，则会并行执行。
jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      # 每个 job 独立运行；Checkout 默认检出触发本次 workflow 的 commit/ref 对应代码。
      - name: Checkout
        uses: actions/checkout@v6

      # 从 go.mod 读取 Go 版本并配置到 PATH，供后续 go/make 命令使用。
      # 启用 Go modules 缓存与构建缓存，加速重复 CI 运行。
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run quality checks
        run: make quality-check

  generated-contract:
    name: Generated Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # OpenAPI lint 通过 npx 执行固定版本 Redocly CLI；CI 显式提供 Node 运行时。
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download Go modules
        run: go mod download

      - name: Lint OpenAPI
        run: make openapi-lint

      - name: Check generated contracts
        run: make generated-check

  docker:
    name: Docker
    runs-on: ubuntu-latest

    # GitHub 托管的 Ubuntu runner 已预装 Docker/Compose，可直接运行 docker 命令。
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 解析并校验 Compose 配置；--quiet 只用退出码表达结果，不打印解析后的完整配置。
      - name: Check Docker Compose config
        run: docker compose config --quiet

      - name: Build Docker image
        run: make docker-build
